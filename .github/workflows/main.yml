name: YT-Shorts-Money-Printer

on:
  workflow_dispatch: # Manual button ke liye
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein auto-run hone ke liye

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts pydub moviepy==1.0.3 requests numpy "Pillow<10.0.0" scipy imageio-ffmpeg
          pip install google-api-python-client google-auth-oauthlib google-auth

      - name: Run Automation Script
        env:
          KEY1: ${{ secrets.KEY1 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python -u script.py

      - name: Commit Processed Topics
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add processed.txt
          git commit -m "Update processed topics" || echo "No changes to commit"
          git push
